# Compila apps mobile do Caixa Posto Janjão:
#   - iOS: .ipa não assinado (Sideloadly / AltStore)
#   - Android: .apk (instalação direta)
#
# Disparo: push na main, tags v* ou manual (Actions → Build Mobile Apps).

name: Build Mobile Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: build-mobile-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build-ipa:
    name: Build unsigned .ipa (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          flutter --version

      - name: Prepare Flutter project with Flet
        run: |
          set -euo pipefail
          flet build ios-simulator \
            --yes \
            --verbose \
            --build-number "${{ github.run_number }}"

      - name: Build unsigned iOS app (device)
        working-directory: build/flutter
        run: |
          set -euo pipefail
          flutter pub get
          flutter build ios --release --no-codesign --build-number "${{ github.run_number }}"

      - name: Package unsigned IPA (Payload)
        shell: bash
        run: |
          set -euo pipefail

          echo "Procurando bundle .app para dispositivo (iphoneos)..."

          is_device_app() {
            case "$1" in
              *iphonesimulator*|*/simulator/*|*/ios-simulator/*|*Simulator.app) return 1 ;;
              *) return 0 ;;
            esac
          }

          find_device_app() {
            local pattern="$1"
            local app
            while IFS= read -r app; do
              if is_device_app "$app"; then
                echo "$app"
                return 0
              fi
            done < <(find build -type d -name "*.app" 2>/dev/null | grep -F "$pattern" | sort -u)
            return 1
          }

          echo "Bundles .app encontrados (exceto simulador):"
          found_any=0
          while IFS= read -r app; do
            if is_device_app "$app"; then
              echo "  $app"
              found_any=1
            fi
          done < <(find build -type d -name "*.app" 2>/dev/null | sort -u)
          [ "$found_any" -eq 0 ] && echo "  (nenhum)"

          RUNNER_APP=""
          RUNNER_APP="$(find_device_app "/iphoneos/" || true)"
          RUNNER_APP="${RUNNER_APP:-$(find_device_app "Release-iphoneos" || true)}"
          RUNNER_APP="${RUNNER_APP:-$(find_device_app "Products/Applications" || true)}"

          if [ -z "$RUNNER_APP" ]; then
            for candidate in \
              build/flutter/build/ios/iphoneos/CaixaPostoJanjao.app \
              build/flutter/build/ios/iphoneos/Runner.app \
              build/ios/iphoneos/CaixaPostoJanjao.app \
              build/ios/iphoneos/Runner.app
            do
              if [ -d "$candidate" ]; then
                RUNNER_APP="$candidate"
                break
              fi
            done
          fi

          if [ -z "$RUNNER_APP" ]; then
            RUNNER_APP="$(find build -type d \( -name "CaixaPostoJanjao.app" -o -name "Runner.app" \) 2>/dev/null | while IFS= read -r app; do if is_device_app "$app"; then echo "$app"; break; fi; done)"
          fi

          if [ -z "$RUNNER_APP" ] || [ ! -d "$RUNNER_APP" ]; then
            echo "::error::Nenhum .app de dispositivo encontrado após o build."
            find build/flutter/build/ios -maxdepth 4 -type d 2>/dev/null | head -80 || true
            find build -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi

          echo "Usando bundle: $RUNNER_APP"

          PKG_DIR="$RUNNER_TEMP/ipa-package"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR/Payload"
          cp -R "$RUNNER_APP" "$PKG_DIR/Payload/"

          mkdir -p dist
          (cd "$PKG_DIR" && zip -qr "$GITHUB_WORKSPACE/dist/caixa-posto-janjao.ipa" Payload)

          ls -lh dist/caixa-posto-janjao.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: caixa-posto-janjao-ipa
          path: dist/caixa-posto-janjao.ipa
          if-no-files-found: error
          retention-days: 30

  build-apk:
    name: Build .apk (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build APK with Flet
        run: |
          set -euo pipefail
          flet build apk \
            --yes \
            --verbose \
            --build-number "${{ github.run_number }}"

      - name: Collect APK output
        shell: bash
        run: |
          set -euo pipefail

          echo "APKs gerados:"
          find build -name "*.apk" -type f 2>/dev/null | sort || true

          APK_FILE=""
          for candidate in \
            build/apk/app-release.apk \
            build/apk/*-release.apk
          do
            if [ -f "$candidate" ]; then
              APK_FILE="$candidate"
              break
            fi
          done

          if [ -z "$APK_FILE" ]; then
            APK_FILE="$(find build -name "*.apk" -type f 2>/dev/null | head -1)"
          fi

          if [ -z "$APK_FILE" ] || [ ! -f "$APK_FILE" ]; then
            echo "::error::Nenhum .apk encontrado após flet build apk."
            find build -type f 2>/dev/null | head -50 || true
            exit 1
          fi

          echo "Usando APK: $APK_FILE"
          mkdir -p dist
          cp "$APK_FILE" dist/caixa-posto-janjao.apk
          ls -lh dist/caixa-posto-janjao.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caixa-posto-janjao-apk
          path: dist/caixa-posto-janjao.apk
          if-no-files-found: error
          retention-days: 30
